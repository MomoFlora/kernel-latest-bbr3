name: Linux Kernel Stable

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Linux Kernel
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Setup variables
      run: |
        sudo timedatectl set-timezone 'Asia/Shanghai'
        sudo hostnamectl set-hostname "builder"
        version=$(curl -fsSL https://www.kernel.org/releases.json | jq -r '.latest_stable.version')
        echo "KERNEL_VERSION=$version" >> "$GITHUB_ENV"

    - name: Show system
      run: |
        echo -e "\n\e[1;32mCPU:\e[0m"
        echo "$(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') ($(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')MHz) x $(grep processor /proc/cpuinfo  | wc -l)"
        echo -e "\n\e[1;32mMemory:\e[0m"
        free -h
        echo -e "\n\e[1;32mStorage:\e[0m"
        df -Th / /mnt
        echo -e "\n\e[1;32mSystem:\e[0m"
        lsb_release -a
        echo -e "\n\e[1;32mKernel:\e[0m"
        uname -a
        echo

    - name: Free disk space
      uses: MomoFlora/actions@free-disk

    - name: Build System Setup
      uses: MomoFlora/actions@linux-build-setup

    - name: Clone Source Code
      run: |
          branch=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
          git clone --depth=1 --branch linux-$branch.y https://github.com/gregkh/linux.git linux

    - name: Add Google BBRv3
      working-directory: ./linux
      run: |
        git remote add google-bbr https://github.com/google/bbr.git
        git fetch google-bbr
        git checkout google-bbr/v3

    - name: Patch BBR Module Description
      working-directory: ./linux
      run: |
        grep -v "MODULE_DESCRIPTION" net/ipv4/tcp_bbr.c > net/ipv4/tcp_bbr.c.tmp
        mv net/ipv4/tcp_bbr.c.tmp net/ipv4/tcp_bbr.c  
        echo 'MODULE_DESCRIPTION("TCP BBR v3 (Bottleneck Bandwidth and RTT) - Compiled & Optimized by MomoFlora");' >> net/ipv4/tcp_bbr.c   
        tail -n 5 net/ipv4/tcp_bbr.c

    - name: Update Kernel Version in Makefile
      working-directory: ./linux
      run: |
        IFS='.' read -r v p s <<< "${{ env.KERNEL_VERSION }}"
        sed -i "s/^VERSION *=.*/VERSION = $v/" Makefile
        sed -i "s/^PATCHLEVEL *=.*/PATCHLEVEL = $p/" Makefile
        sed -i "s/^SUBLEVEL *=.*/SUBLEVEL = $s/" Makefile

    - name: Prepare Kernel Configuration
      working-directory: ./linux
      run: |
          cp -f $GITHUB_WORKSPACE/configs/x86_64.config .config
          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          # Mitigation for Dirty Frag attack surface.
          scripts/config --disable XFRM_ESP
          scripts/config --disable INET_ESP
          scripts/config --disable INET6_ESP
          scripts/config --disable AF_RXRPC
          make olddefconfig

    - name: Build Debian Kernel Packages
      working-directory: ./linux
      run: |
          make bindeb-pkg -j$(nproc) LOCALVERSION=-momoflora-bbrv3 KDEB_COMPRESS=gzip skipdbg=true

    - name: Upload Debian Packages
      uses: actions/upload-artifact@v4
      with:
        name: deb-${{ env.KERNEL_VERSION }}
        path: ./*.deb

    - name: Generate Release Notes
      run: |
        cat > info.md <<EOF
        # 🚀 Linux Kernel Packages (BBRv3 Enhanced Build)

        ## ✨ Overview
        This is a custom-built Linux kernel release with **Google BBRv3 congestion control** integration, designed for improved network performance, lower latency, and higher throughput on **x86_64 architecture** systems.

        ---

        ## ⚡ Key Features
        - 🚄 Integrated **Google BBRv3** congestion control algorithm  
        - 📈 Optimized TCP networking stack for higher throughput  
        - ⏱️ Reduced latency under high-load network conditions  
        - 🧠 Custom kernel configuration tuned for stability & performance  
        - 🔐 Security hardening enhancements applied  
        - 🧩 Debian-based `.deb` packaging for seamless installation  

        ---

        ## 🧱 Kernel Details
        - **Kernel Version:** ${KERNEL_VERSION}
        - **Architecture:** x86_64  
        - **Packages Included:**
          - linux-image
          - linux-headers  

        ---

        ## 🛠️ Build Information
        - 🤖 Automatically built via GitHub Actions  
        - 🧑‍💻 Compiled & optimized by Joey  
        - 🧪 Built on latest Ubuntu runner environment  
        - 📦 Output packaged in Debian format  

        ---

        ## 📥 Installation
        ```bash
        sudo dpkg -i *.deb
        ```

        ---

        ## ⚠️ Notes
        - Please verify compatibility before deploying in production environments
        - This kernel is optimized for performance-focused workloads
        - Use at your own risk in mission-critical systems
        EOF

    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2.2.1
      with:
        tag_name: ${{ env.KERNEL_VERSION }}
        body_path: ${{ github.workspace }}/info.md
        files: ./*.deb
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
